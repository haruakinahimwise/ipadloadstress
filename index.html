<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Spiky Ball Stress Tester (Hantavirus Mode)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
  }

  /* ⭐ CANVAS FIX — prevent blocking taps */
  canvas {
    pointer-events: none !important;
    z-index: 1 !important;
    position: fixed;
    top: 0;
    left: 0;
  }

  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    font-size: 14px;
    display: none;
  }

  #ui button, #ui input[type=range] {
    margin-top: 6px;
    width: 100%;
  }

  #fps {
    font-weight: bold;
    margin-top: 4px;
  }

  #uiToggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    user-select: none;
  }

  /* ⭐ TAP SCREEN ALWAYS ON TOP */
  #tapToStart {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    z-index: 999999 !important;
    pointer-events: auto !important;
  }
</style>
</head>
<body>

<div id="tapToStart">Tap to Start</div>

<div id="uiToggle">☰</div>

<div id="ui">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <b>3D Spiky Ball Stress Tester</b>
    <button id="hideUiBtn" style="width:auto;padding:2px 6px;font-size:11px;">Hide</button>
  </div>

  <div id="fps">FPS: 0</div>

  <div style="margin-top:6px;">
    Ball count: <span id="ballCountLabel">200</span>
  </div>
  <input id="ballCount" type="range" min="50" max="1000" step="50" value="200">
  <button id="spawnBtn">Apply ball count</button>

  <button id="spawnInfiniteBtn">Spawn Infinite Balls (HANTAV1)</button>
  <button id="spawnHantaV2Btn" style="background:#ff2222;">Spawn HANTAV2 (Progressive)</button>
  <button id="spawnHantaV3Btn" style="background:#aa00ff;">Spawn HANTAV3 (Progressive Heavy)</button>

  <div style="margin-top:10px; text-align:left;">
    <b>Device Specs</b>
    <div id="specs" style="font-size:12px; line-height:1.3;"></div>
  </div>
</div>

<script>
let appStarted = false;

/* ⭐ Load THREE.js AFTER tap */
function loadThreeJS(callback) {
  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
  script.onload = callback;
  document.body.appendChild(script);
}

/* ⭐ TAP TO START */
document.getElementById("tapToStart").addEventListener("mousedown", startApp, { once: true });
document.getElementById("tapToStart").addEventListener("touchstart", startApp, { once: true });
document.body.addEventListener("click", startApp, { once: true });

function startApp() {
  if (appStarted) return;
  appStarted = true;

  document.getElementById("tapToStart").style.display = "none";

  loadThreeJS(() => {
    init();
    animate();
    getSpecs();
  });
}

/* -------------------------
   GLOBALS
--------------------------*/
let scene, camera, renderer;
let spikyGroup;
let lastTime = performance.now();
let fpsEl;
let infiniteSpawn = false;

let zoomIn = false;
let zoomOut = false;
let zoomSpeed = 2;

let hantaV2Level = 1;
let hantaV3Level = 1;

/* -------------------------
   INIT
--------------------------*/
function init() {
  document.getElementById("ui").style.display = "block";
  document.getElementById("uiToggle").style.display = "flex";

  fpsEl = document.getElementById('fps');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
  camera.position.set(0, 0, 120);

  renderer = new THREE.WebGLRenderer({
    antialias: false,
    powerPreference: "high-performance",
    preserveDrawingBuffer: false
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  document.body.appendChild(renderer.domElement);

  /* ⭐ ENABLE CANVAS TOUCHES ONLY AFTER START */
  renderer.domElement.style.pointerEvents = "auto";
  renderer.domElement.style.zIndex = "1";

  scene.add(new THREE.AmbientLight(0x555555));

  const d1 = new THREE.DirectionalLight(0xff66ff, 1.2);
  d1.position.set(50, 80, 40);
  scene.add(d1);

  const d2 = new THREE.DirectionalLight(0x66ccff, 0.9);
  d2.position.set(-60, -40, -30);
  scene.add(d2);

  spikyGroup = new THREE.Group();
  scene.add(spikyGroup);

  spawnSpikyBalls(200);

  window.addEventListener('resize', onWindowResize);

  document.getElementById('spawnBtn').addEventListener('click', () => {
    const count = parseInt(document.getElementById('ballCount').value, 10);
    document.getElementById('ballCountLabel').innerText = count;
    spawnSpikyBalls(count);
  });

  document.getElementById('spawnInfiniteBtn').addEventListener('click', () => {
    infiniteSpawn = !infiniteSpawn;
    if (infiniteSpawn) spawnInfinite();
  });

  document.getElementById("spawnHantaV2Btn").addEventListener("click", () => {
    hantaV2Level = 1;
    spawnHantaV2();
  });

  document.getElementById("spawnHantaV3Btn").addEventListener("click", () => {
    hantaV3Level = 1;
    spawnHantaV3();
  });

  initControls();
  initZoomControls();
  initRetractableUI();
}

/* -------------------------
   RETRACTABLE UI
--------------------------*/
function initRetractableUI() {
  const ui = document.getElementById("ui");
  const uiToggle = document.getElementById("uiToggle");
  const hideUiBtn = document.getElementById("hideUiBtn");

  hideUiBtn.addEventListener("click", () => {
    ui.style.display = "none";
    uiToggle.style.display = "flex";
  });

  uiToggle.addEventListener("click", () => {
    ui.style.display = "block";
    uiToggle.style.display = "none";
  });
}

/* -------------------------
   NORMAL BALL SPAWN
--------------------------*/
function spawnSpikyBalls(count) {
  while (spikyGroup.children.length > 0) {
    spikyGroup.remove(spikyGroup.children[0]);
  }

  const geo = new THREE.IcosahedronGeometry(4, 1);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    const len = Math.sqrt(x*x + y*y + z*z) || 1;
    const spike = 1 + Math.random() * 0.8;
    pos.setXYZ(i, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color: 0xff00ff,
    metalness: 0.6,
    roughness: 0.3,
    emissive: 0x220022,
    emissiveIntensity: 0.7
  });

  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200
    );
    mesh.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    spikyGroup.add(mesh);
  }
}

/* -------------------------
   HANTAV1 (Infinite)
--------------------------*/
function spawnInfinite() {
  if (!infiniteSpawn) return;

  const now = performance.now();
  const fps = Math.max(1, Math.min(60, Math.round(1000 / (now - lastTime))));
  const BALLS_PER_FRAME = Math.floor(200 + (60 - fps) * 10);

  for (let i = 0; i < BALLS_PER_FRAME; i++) {
    const geo = new THREE.IcosahedronGeometry(4, 3);
    const pos = geo.attributes.position;

    for (let j = 0; j < pos.count; j++) {
      const x = pos.getX(j);
      const y = pos.getY(j);
      const z = pos.getZ(j);
      const len = Math.sqrt(x*x + y*y + z*z) || 1;
      const spike = 1 + Math.random() * 2.5;
      pos.setXYZ(j, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
    }
    pos.needsUpdate = true;
    geo.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(Math.random(), Math.random(), Math.random()),
      metalness: 0.9,
      roughness: 0.15,
      emissive: new THREE.Color(Math.random(), Math.random(), Math.random()),
      emissiveIntensity: 2 + Math.random() * 2
    });

    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.set(
      (Math.random() - 0.5) * 500,
      (Math.random() - 0.5) * 500,
      (Math.random() - 0.5) * 500
    );

    mesh.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );

    const s = 0.2 + Math.random() * 6;
    mesh.scale.set(s, s, s);

    spikyGroup.add(mesh);
  }

  camera.position.x += (Math.random() - 0.5) * 0.5;
  camera.position.y += (Math.random() - 0.5) * 0.5;

  requestAnimationFrame(spawnInfinite);
}

/* -------------------------
   HANTAV2 (Progressive Instancing)
--------------------------*/
function spawnHantaV2() {
  hantaV2Level += 0.5;
  const count = Math.floor(2000 * hantaV2Level);

  const geo = new THREE.IcosahedronGeometry(4, 2);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    metalness: 1,
    roughness: 0,
    emissive: 0xffffff,
    emissiveIntensity: 3
  });

  const instanced = new THREE.InstancedMesh(geo, mat, count);
  const dummy = new THREE.Object3D();

  for (let i = 0; i < count; i++) {
    dummy.position.set(
      (Math.random() - 0.5) * (500 + hantaV2Level * 50),
      (Math.random() - 0.5) * (500 + hantaV2Level * 50),
      (Math.random() - 0.5) * (500 + hantaV2Level * 50)
    );

    dummy.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );

    const s = 1 + Math.random() * (hantaV2Level * 0.5);
    dummy.scale.set(s, s, s);

    dummy.updateMatrix();
    instanced.setMatrixAt(i, dummy.matrix);
  }

  spikyGroup.add(instanced);

  setTimeout(spawnHantaV2, 200);
}

/* -------------------------
   HANTAV3 (Progressive Heavy Mesh Spam)
--------------------------*/
function spawnHantaV3() {
  hantaV3Level += 0.3;
  const BALLS_PER_FRAME = Math.floor(50 * hantaV3Level);
  const sizeBoost = hantaV3Level * 0.2;

  for (let i = 0; i < BALLS_PER_FRAME; i++) {
    const geo = new THREE.IcosahedronGeometry(4, 3);
    const pos = geo.attributes.position;

    for (let j = 0; j < pos.count; j++) {
      const x = pos.getX(j);
      const y = pos.getY(j);
      const z = pos.getZ(j);
      const len = Math.sqrt(x*x + y*y + z*z) || 1;
      const spike = 1 + Math.random() * (1.5 + sizeBoost);
      pos.setXYZ(j, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
    }
    pos.needsUpdate = true;
    geo.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(Math.random(), Math.random(), Math.random()),
      metalness: 1.0,
      roughness: 0.1,
      emissive: new THREE.Color(Math.random(), Math.random(), Math.random()),
      emissiveIntensity: 2 + sizeBoost
    });

    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.set(
      (Math.random() - 0.5) * (400 + hantaV3Level * 30),
      (Math.random() - 0.5) * (400 + hantaV3Level * 30),
      (Math.random() - 0.5) * (400 + hantaV3Level * 30)
    );

    const s = 1 + Math.random() * (2 + sizeBoost);
    mesh.scale.set(s, s, s);

    spikyGroup.add(mesh);
  }

  requestAnimationFrame(spawnHantaV3);
}

/* -------------------------
   CAMERA CONTROLS
--------------------------*/
let dragging = false;
let prevX = 0, prevY = 0;
let yaw = 0, pitch = 0;

function initControls() {
  renderer.domElement.addEventListener('pointerdown', e => {
    dragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
  });

  window.addEventListener('pointerup', () => dragging = false);

  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    prevX = e.clientX;
    prevY = e.clientY;

    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
    pitch = Math.max(-1.3, Math.min(1.3, pitch));
  });
}

function initZoomControls() {
  window.addEventListener("keydown", (e) => {
    if (e.code === "KeyE") zoomIn = true;
    if (e.code === "KeyQ") zoomOut = true;
  });

  window.addEventListener("keyup", (e) => {
    if (e.code === "KeyE") zoomIn = false;
    if (e.code === "KeyQ") zoomOut = false;
  });
}

function updateCamera() {
  const forward = new THREE.Vector3(
    Math.sin(yaw) * Math.cos(pitch),
    Math.sin(pitch),
    Math.cos(yaw) * Math.cos(pitch)
  );

  if (zoomIn) camera.position.addScaledVector(forward, zoomSpeed);
  if (zoomOut) camera.position.addScaledVector(forward, -zoomSpeed);

  const target = new THREE.Vector3().addVectors(camera.position, forward);
  camera.lookAt(target
