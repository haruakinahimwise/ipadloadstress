<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Spiky Ball Stress Tester (Hantavirus Mode)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
  }
  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    font-size: 14px;
  }
  #ui button, #ui input[type=range] {
    margin-top: 6px;
    width: 100%;
  }
  #fps {
    font-weight: bold;
    margin-top: 4px;
  }
  #tapToStart {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    z-index: 999;
  }
</style>
</head>
<body>

<div id="tapToStart">Tap to Start</div>

<div id="ui" style="display:none;">
  <div><b>3D Spiky Ball Stress Tester</b></div>
  <div id="fps">FPS: 0</div>

  <div style="margin-top:6px;">
    Ball count: <span id="ballCountLabel">200</span>
  </div>
  <input id="ballCount" type="range" min="50" max="1000" step="50" value="200">
  <button id="spawnBtn">Apply ball count</button>

  <button id="spawnInfiniteBtn">Spawn Infinite Balls (HANTAVIRUS)</button>

  <div style="margin-top:10px; text-align:left;">
    <b>Device Specs</b>
    <div id="specs" style="font-size:12px; line-height:1.3;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let spikyGroup;
let lastTime = performance.now();
let fpsEl;
let infiniteSpawn = false;

// ZOOM VARIABLES
let zoomIn = false;
let zoomOut = false;
let zoomSpeed = 2;

document.getElementById("tapToStart").addEventListener("touchstart", startApp, { once: true });
document.getElementById("tapToStart").addEventListener("mousedown", startApp, { once: true });

function startApp() {
  document.getElementById("tapToStart").style.display = "none";
  document.getElementById("ui").style.display = "block";
  init();
  animate();
  getSpecs();
}

function init() {
  fpsEl = document.getElementById('fps');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    4000
  );
  camera.position.set(0, 0, 120);

  renderer = new THREE.WebGLRenderer({
    antialias: false,
    powerPreference: "high-performance",
    preserveDrawingBuffer: false
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x555555));

  const d1 = new THREE.DirectionalLight(0xff66ff, 1.2);
  d1.position.set(50, 80, 40);
  scene.add(d1);

  const d2 = new THREE.DirectionalLight(0x66ccff, 0.9);
  d2.position.set(-60, -40, -30);
  scene.add(d2);

  spikyGroup = new THREE.Group();
  scene.add(spikyGroup);

  spawnSpikyBalls(200);

  window.addEventListener('resize', onWindowResize);

  document.getElementById('spawnBtn').addEventListener('click', () => {
    const count = parseInt(document.getElementById('ballCount').value, 10);
    document.getElementById('ballCountLabel').innerText = count;
    spawnSpikyBalls(count);
  });

  document.getElementById('spawnInfiniteBtn').addEventListener('click', () => {
    infiniteSpawn = !infiniteSpawn;
    if (infiniteSpawn) spawnInfinite();
  });

  initControls();
  initZoomControls();
}

function spawnSpikyBalls(count) {
  while (spikyGroup.children.length > 0) {
    spikyGroup.remove(spikyGroup.children[0]);
  }

  const geo = new THREE.IcosahedronGeometry(4, 1);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    const len = Math.sqrt(x*x + y*y + z*z) || 1;
    const spike = 1 + Math.random() * 0.8;
    pos.setXYZ(i, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color: 0xff00ff,
    metalness: 0.6,
    roughness: 0.3,
    emissive: 0x220022,
    emissiveIntensity: 0.7
  });

  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200
    );
    mesh.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    spikyGroup.add(mesh);
  }
}

// HANTAVIRUS infinite spawn
function spawnInfinite() {
  if (!infiniteSpawn) return;

  const now = performance.now();
  const fps = Math.max(1, Math.min(60, Math.round(1000 / (now - lastTime))));
  const BALLS_PER_FRAME = Math.floor(200 + (60 - fps) * 10);

  for (let i = 0; i < BALLS_PER_FRAME; i++) {
    const geo = new THREE.IcosahedronGeometry(4, 3);
    const pos = geo.attributes.position;

    for (let j = 0; j < pos.count; j++) {
      const x = pos.getX(j);
      const y = pos.getY(j);
      const z = pos.getZ(j);
      const len = Math.sqrt(x*x + y*y + z*z) || 1;
      const spike = 1 + Math.random() * 2.5;
      pos.setXYZ(j, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
    }
    pos.needsUpdate = true;
    geo.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(Math.random(), Math.random(), Math.random()),
      metalness: 0.9,
      roughness: 0.15,
      emissive: new THREE.Color(Math.random(), Math.random(), Math.random()),
      emissiveIntensity: 2 + Math.random() * 2
    });

    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.set(
      (Math.random() - 0.5) * 500,
      (Math.random() - 0.5) * 500,
      (Math.random() - 0.5) * 500
    );

    mesh.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );

    const s = 0.2 + Math.random() * 6;
    mesh.scale.set(s, s, s);

    spikyGroup.add(mesh);
  }

  camera.position.x += (Math.random() - 0.5) * 0.5;
  camera.position.y += (Math.random() - 0.5) * 0.5;

  requestAnimationFrame(spawnInfinite);
}

let dragging = false;
let prevX = 0, prevY = 0;
let yaw = 0, pitch = 0;

function initControls() {
  renderer.domElement.addEventListener('pointerdown', e => {
    dragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
  });

  window.addEventListener('pointerup', () => dragging = false);

  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    prevX = e.clientX;
    prevY = e.clientY;

    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
    pitch = Math.max(-1.3, Math.min(1.3, pitch));
  });
}

function initZoomControls() {
  window.addEventListener("keydown", (e) => {
    if (e.code === "KeyE") zoomIn = true;
    if (e.code === "KeyQ") zoomOut = true;
  });

  window.addEventListener("keyup", (e) => {
    if (e.code === "KeyE") zoomIn = false;
    if (e.code === "KeyQ") zoomOut = false;
  });
}

function updateCamera() {
  const forward = new THREE.Vector3(
    Math.sin(yaw) * Math.cos(pitch),
    Math.sin(pitch),
    Math.cos(yaw) * Math.cos(pitch)
  );

  if (zoomIn) camera.position.addScaledVector(forward, zoomSpeed);
  if (zoomOut) camera.position.addScaledVector(forward, -zoomSpeed);

  const target = new THREE.Vector3().addVectors(camera.position, forward);
  camera.lookAt(target);
}

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const fps = Math.round(1000 / (now - lastTime));
  lastTime = now;
  fpsEl.textContent = "FPS: " + fps;

  spikyGroup.rotation.y += 0.002;
  spikyGroup.rotation.x += 0.001;

  updateCamera();
  renderer.render(scene, camera);
}

function getSpecs() {
  const gl = document.createElement("canvas").getContext("webgl");
  const debug = gl.getExtension("WEBGL_debug_renderer_info");

  const specs = {
    browser: navigator.userAgent,
    cpuThreads: navigator.hardwareConcurrency || "Unknown",
    deviceMemory: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Unknown",
    screen: `${window.screen.width} x ${window.screen.height}`,
    gpu: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Unknown GPU",
    vendor: debug ? gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) : "Unknown Vendor",
    maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE)
  };

  let html = "";
  for (const k in specs) html += `<b>${k}:</b> ${specs[k]}<br>`;
  document.getElementById("specs").innerHTML = html;
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
