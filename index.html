<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spiky Chaos Engine</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
  }

  /* Canvas disabled BEFORE start */
  canvas {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #tapToStart {
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    z-index: 999999;
    pointer-events: auto;
  }

  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    display: none;
  }

  #uiToggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
</style>
</head>
<body>

<div id="tapToStart">Tap to Start</div>

<div id="uiToggle">☰</div>

<div id="ui">
  <b>Spiky Chaos Engine</b><br><br>

  <div id="fps">FPS: 0</div><br>

  <button id="spawnV1">HANTAV1</button>
  <button id="spawnV2" style="background:#ff2222;">HANTAV2 Progressive</button>
  <button id="spawnV3" style="background:#aa00ff;">HANTAV3 Progressive</button>
</div>

<script>
/* ---------------------------------------------------
   HARD‑LOCK SYSTEM
--------------------------------------------------- */
let appStarted = false;

function block() {
  return !appStarted;
}

/* ---------------------------------------------------
   TAP TO START
--------------------------------------------------- */
document.getElementById("tapToStart").addEventListener("mousedown", startApp, { once: true });
document.getElementById("tapToStart").addEventListener("touchstart", startApp, { once: true });
document.body.addEventListener("click", startApp, { once: true });

function startApp() {
  if (appStarted) return;
  appStarted = true;

  document.getElementById("tapToStart").style.display = "none";

  // Load THREE.js AFTER tap
  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
  script.onload = () => {
    init();
    animate();
  };
  document.body.appendChild(script);
}

/* ---------------------------------------------------
   GLOBALS
--------------------------------------------------- */
let scene, camera, renderer;
let spikyGroup;
let lastTime = performance.now();
let fpsEl;

let dragging = false;
let prevX = 0, prevY = 0;
let yaw = 0, pitch = 0;

let zoomIn = false;
let zoomOut = false;
let zoomSpeed = 2;

let v2Level = 1;
let v3Level = 1;

/* ---------------------------------------------------
   INIT
--------------------------------------------------- */
function init() {
  if (block()) return;

  document.getElementById("ui").style.display = "block";
  document.getElementById("uiToggle").style.display = "flex";

  fpsEl = document.getElementById("fps");

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 4000);
  camera.position.set(0, 0, 140);

  renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // Canvas now accepts touches
  renderer.domElement.style.pointerEvents = "auto";

  scene.add(new THREE.AmbientLight(0x555555));

  const d1 = new THREE.DirectionalLight(0xff66ff, 1.2);
  d1.position.set(50, 80, 40);
  scene.add(d1);

  const d2 = new THREE.DirectionalLight(0x66ccff, 0.9);
  d2.position.set(-60, -40, -30);
  scene.add(d2);

  spikyGroup = new THREE.Group();
  scene.add(spikyGroup);

  initControls();
  initZoomControls();

  document.getElementById("spawnV1").onclick = () => spawnV1();
  document.getElementById("spawnV2").onclick = () => { v2Level = 1; spawnV2(); };
  document.getElementById("spawnV3").onclick = () => { v3Level = 1; spawnV3(); };

  window.addEventListener("resize", onResize);
}

/* ---------------------------------------------------
   SPIKY SHAPE GENERATOR
--------------------------------------------------- */
function makeSpikyGeo() {
  const geo = new THREE.IcosahedronGeometry(4, 3);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const len = Math.sqrt(x*x + y*y + z*z) || 1;
    const spike = 1 + Math.random() * 4.5;
    pos.setXYZ(i, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
  }

  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

function makeFlashMat() {
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(Math.random(), Math.random(), Math.random()),
    metalness: 1.0,
    roughness: 0.1,
    emissive: new THREE.Color(Math.random(), Math.random(), Math.random()),
    emissiveIntensity: 3 + Math.random() * 4
  });
}

/* ---------------------------------------------------
   CHAOS MODES
--------------------------------------------------- */
function spawnV1() {
  if (block()) return;

  const geo = makeSpikyGeo();
  const mat = makeFlashMat();
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.set(
    (Math.random() - 0.5) * 600,
    (Math.random() - 0.5) * 600,
    (Math.random() - 0.5) * 600
  );

  mesh.rotation.set(
    Math.random() * Math.PI,
    Math.random() * Math.PI,
    Math.random() * Math.PI
  );

  const s = 1 + Math.random() * 6;
  mesh.scale.set(s, s, s);

  spikyGroup.add(mesh);

  requestAnimationFrame(spawnV1);
}

function spawnV2() {
  if (block()) return;

  v2Level += 0.5;
  const count = Math.floor(200 * v2Level);

  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(makeSpikyGeo(), makeFlashMat());
    mesh.position.set(
      (Math.random() - 0.5) * (400 + v2Level * 40),
      (Math.random() - 0.5) * (400 + v2Level * 40),
      (Math.random() - 0.5) * (400 + v2Level * 40)
    );
    spikyGroup.add(mesh);
  }

  setTimeout(spawnV2, 200);
}

function spawnV3() {
  if (block()) return;

  v3Level += 0.3;
  const count = Math.floor(40 * v3Level);

  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(makeSpikyGeo(), makeFlashMat());
    mesh.position.set(
      (Math.random() - 0.5) * (500 + v3Level * 50),
      (Math.random() - 0.5) * (500 + v3Level * 50),
      (Math.random() - 0.5) * (500 + v3Level * 50)
    );
    spikyGroup.add(mesh);
  }

  requestAnimationFrame(spawnV3);
}

/* ---------------------------------------------------
   CAMERA CONTROLS (TOUCH FIXED)
--------------------------------------------------- */
function initControls() {
  renderer.domElement.addEventListener("pointerdown", e => {
    dragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
  });

  renderer.domElement.addEventListener("pointermove", e => {
    if (!dragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    prevX = e.clientX;
    prevY = e.clientY;
    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
  });

  renderer.domElement.addEventListener("pointerup", () => dragging = false);

  // TOUCH FIX
  renderer.domElement.addEventListener("touchstart", e => {
    dragging = true;
    prevX = e.touches[0].clientX;
    prevY = e.touches[0].clientY;
  });

  renderer.domElement.addEventListener("touchmove", e => {
    if (!dragging) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - prevX;
    const dy = y - prevY;
    prevX = x;
    prevY = y;
    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
  });

  renderer.domElement.addEventListener("touchend", () => dragging = false);
}

function initZoomControls() {
  window.addEventListener("keydown", e => {
    if (e.code === "KeyE") zoomIn = true;
    if (e.code === "KeyQ") zoomOut = true;
  });
  window.addEventListener("keyup", e => {
    if (e.code === "KeyE") zoomIn = false;
    if (e.code === "KeyQ") zoomOut = false;
  });
}

function updateCamera() {
  const forward = new THREE.Vector3(
    Math.sin(yaw),
    Math.sin(pitch),
    Math.cos(yaw)
  );

  if (zoomIn) camera.position.addScaledVector(forward, zoomSpeed);
  if (zoomOut) camera.position.addScaledVector(forward, -zoomSpeed);

  camera.lookAt(forward.add(camera.position));
}

/* ---------------------------------------------------
   ANIMATE
--------------------------------------------------- */
function animate() {
  if (block()) return;

  requestAnimationFrame(animate);

  const now = performance.now();
  const fps = Math.round(1000 / (now - lastTime));
  lastTime = now;
  fpsEl.textContent = "FPS: " + fps;

  spikyGroup.rotation.y += 0.002;
  spikyGroup.rotation.x += 0.001;

  updateCamera();
  renderer.render(scene, camera);
}

/* ---------------------------------------------------
   RESIZE
--------------------------------------------------- */
function onResize() {
  if (!camera || !renderer) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
</script>

</body>
</html>
