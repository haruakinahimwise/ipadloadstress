<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Stress Tester (Hard‑Lock Edition)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
  }

  /* CANVAS NEVER BLOCKS TAPS BEFORE START */
  canvas {
    pointer-events: none !important;
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #tapToStart {
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    z-index: 999999999 !important;
    pointer-events: auto !important;
  }

  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    display: none;
  }

  #uiToggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
</style>
</head>
<body>

<div id="tapToStart">Tap to Start</div>

<div id="uiToggle">☰</div>

<div id="ui">
  <b>3D Stress Tester</b><br><br>

  <div id="fps">FPS: 0</div><br>

  Ball Count: <span id="ballCountLabel">200</span><br>
  <input id="ballCount" type="range" min="50" max="1000" step="50" value="200"><br>
  <button id="spawnBtn">Apply</button><br><br>

  <button id="spawnInfiniteBtn">HANTAV1</button>
  <button id="spawnHantaV2Btn" style="background:#ff2222;">HANTAV2 Progressive</button>
  <button id="spawnHantaV3Btn" style="background:#aa00ff;">HANTAV3 Progressive</button>
</div>

<script>
/* ---------------------------------------------------
   HARD‑LOCK SYSTEM
--------------------------------------------------- */
let appStarted = false;

function block() {
  return !appStarted;
}

/* ---------------------------------------------------
   TAP TO START
--------------------------------------------------- */
document.getElementById("tapToStart").addEventListener("mousedown", startApp, { once: true });
document.getElementById("tapToStart").addEventListener("touchstart", startApp, { once: true });
document.body.addEventListener("click", startApp, { once: true });

function startApp() {
  if (appStarted) return;
  appStarted = true;

  document.getElementById("tapToStart").style.display = "none";

  // Re-enable pointer events for everything AFTER start
  document.querySelectorAll("*").forEach(el => {
    el.style.pointerEvents = "auto";
  });

  // Load THREE.js AFTER tap
  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
  script.onload = () => {
    init();
    animate();
  };
  document.body.appendChild(script);
}

/* ---------------------------------------------------
   GLOBALS
--------------------------------------------------- */
let scene, camera, renderer;
let spikyGroup;
let lastTime = performance.now();
let fpsEl;
let infiniteSpawn = false;

let zoomIn = false;
let zoomOut = false;
let zoomSpeed = 2;

let hantaV2Level = 1;
let hantaV3Level = 1;

/* ---------------------------------------------------
   INIT
--------------------------------------------------- */
function init() {
  if (block()) return;

  document.getElementById("ui").style.display = "block";
  document.getElementById("uiToggle").style.display = "flex";

  fpsEl = document.getElementById("fps");

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 4000);
  camera.position.set(0, 0, 120);

  renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  renderer.domElement.style.pointerEvents = "auto";

  scene.add(new THREE.AmbientLight(0x555555));

  const d1 = new THREE.DirectionalLight(0xff66ff, 1.2);
  d1.position.set(50, 80, 40);
  scene.add(d1);

  const d2 = new THREE.DirectionalLight(0x66ccff, 0.9);
  d2.position.set(-60, -40, -30);
  scene.add(d2);

  spikyGroup = new THREE.Group();
  scene.add(spikyGroup);

  spawnSpikyBalls(200);

  window.addEventListener("resize", onResize);

  document.getElementById("spawnBtn").onclick = () => {
    if (block()) return;
    const count = parseInt(document.getElementById("ballCount").value);
    document.getElementById("ballCountLabel").innerText = count;
    spawnSpikyBalls(count);
  };

  document.getElementById("spawnInfiniteBtn").onclick = () => {
    if (block()) return;
    infiniteSpawn = !infiniteSpawn;
    if (infiniteSpawn) spawnInfinite();
  };

  document.getElementById("spawnHantaV2Btn").onclick = () => {
    if (block()) return;
    hantaV2Level = 1;
    spawnHantaV2();
  };

  document.getElementById("spawnHantaV3Btn").onclick = () => {
    if (block()) return;
    hantaV3Level = 1;
    spawnHantaV3();
  };

  initControls();
  initZoomControls();
}

/* ---------------------------------------------------
   NORMAL BALL SPAWN
--------------------------------------------------- */
function spawnSpikyBalls(count) {
  if (block()) return;

  while (spikyGroup.children.length) spikyGroup.remove(spikyGroup.children[0]);

  const geo = new THREE.IcosahedronGeometry(4, 1);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const len = Math.sqrt(x*x + y*y + z*z) || 1;
    const spike = 1 + Math.random() * 0.8;
    pos.setXYZ(i, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
  }
  pos.needsUpdate = true;

  const mat = new THREE.MeshStandardMaterial({
    color: 0xff00ff,
    metalness: 0.6,
    roughness: 0.3
  });

  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200
    );
    spikyGroup.add(mesh);
  }
}

/* ---------------------------------------------------
   HANTAV1
--------------------------------------------------- */
function spawnInfinite() {
  if (block() || !infiniteSpawn) return;

  const now = performance.now();
  const fps = Math.max(1, Math.min(60, Math.round(1000 / (now - lastTime))));
  const count = Math.floor(200 + (60 - fps) * 10);

  for (let i = 0; i < count; i++) {
    const geo = new THREE.IcosahedronGeometry(4, 3);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(Math.random(), Math.random(), Math.random())
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * 500,
      (Math.random() - 0.5) * 500,
      (Math.random() - 0.5) * 500
    );
    spikyGroup.add(mesh);
  }

  requestAnimationFrame(spawnInfinite);
}

/* ---------------------------------------------------
   HANTAV2 (Progressive)
--------------------------------------------------- */
function spawnHantaV2() {
  if (block()) return;

  hantaV2Level += 0.5;
  const count = Math.floor(2000 * hantaV2Level);

  const geo = new THREE.IcosahedronGeometry(4, 2);
  const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });

  const inst = new THREE.InstancedMesh(geo, mat, count);
  const dummy = new THREE.Object3D();

  for (let i = 0; i < count; i++) {
    dummy.position.set(
      (Math.random() - 0.5) * (500 + hantaV2Level * 50),
      (Math.random() - 0.5) * (500 + hantaV2Level * 50),
      (Math.random() - 0.5) * (500 + hantaV2Level * 50)
    );
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
  }

  spikyGroup.add(inst);

  setTimeout(spawnHantaV2, 200);
}

/* ---------------------------------------------------
   HANTAV3 (Progressive Heavy)
--------------------------------------------------- */
function spawnHantaV3() {
  if (block()) return;

  hantaV3Level += 0.3;
  const count = Math.floor(50 * hantaV3Level);

  for (let i = 0; i < count; i++) {
    const geo = new THREE.IcosahedronGeometry(4, 3);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(Math.random(), Math.random(), Math.random())
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * (400 + hantaV3Level * 30),
      (Math.random() - 0.5) * (400 + hantaV3Level * 30),
      (Math.random() - 0.5) * (400 + hantaV3Level * 30)
    );
    spikyGroup.add(mesh);
  }

  requestAnimationFrame(spawnHantaV3);
}

/* ---------------------------------------------------
   CAMERA + CONTROLS
--------------------------------------------------- */
let dragging = false;
let prevX = 0, prevY = 0;
let yaw = 0, pitch = 0;

function initControls() {
  renderer.domElement.addEventListener("pointerdown", e => {
    dragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
  });

  window.addEventListener("pointerup", () => dragging = false);

  window.addEventListener("pointermove", e => {
    if (!dragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    prevX = e.clientX;
    prevY = e.clientY;

    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
  });
}

function initZoomControls() {
  window.addEventListener("keydown", e => {
    if (e.code === "KeyE") zoomIn = true;
    if (e.code === "KeyQ") zoomOut = true;
  });
  window.addEventListener("keyup", e => {
    if (e.code === "KeyE") zoomIn = false;
    if (e.code === "KeyQ") zoomOut = false;
  });
}

function updateCamera() {
  const forward = new THREE.Vector3(
    Math.sin(yaw),
    Math.sin(pitch),
    Math.cos(yaw)
  );

  if (zoomIn) camera.position.addScaledVector(forward, zoomSpeed);
  if (zoomOut) camera.position.addScaledVector(forward, -zoomSpeed);

  camera.lookAt(forward.add(camera.position));
}

/* ---------------------------------------------------
   ANIMATE
--------------------------------------------------- */
function animate() {
  if (block()) return;

  requestAnimationFrame(animate);

  const now = performance.now();
  const fps = Math.round(1000 / (now - lastTime));
  lastTime = now;
  fpsEl.textContent = "FPS: " + fps;

  spikyGroup.rotation.y += 0.002;
  spikyGroup.rotation.x += 0.001;

  updateCamera();
  renderer.render(scene, camera);
}

/* ---------------------------------------------------
   RESIZE
--------------------------------------------------- */
function onResize() {
  if (!camera || !renderer) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
</script>

</body>
</html>
