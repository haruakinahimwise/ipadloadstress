<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google</title></title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
  }

  canvas {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #tapToStart {
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    z-index: 999999;
    pointer-events: auto;
  }

  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    display: none;
  }

  #uiToggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  #ui button {
    margin: 2px 0;
    display: block;
    width: 180px;
  }
</style>
</head>
<body>

<div id="tapToStart">Tap to Start</div>

<div id="uiToggle">☰</div>

<div id="ui">
  <b>Spiky Chaos Engine</b><br><br>

  <div id="fps">FPS: 0</div><br>

  <button id="spawnV1">HANTAV1</button>
  <button id="spawnV2" style="background:#ff2222;">HANTAV2 Progressive</button>
  <button id="spawnV3" style="background:#aa00ff;">HANTAV3 Progressive</button>
  <button id="spawnV4" style="background:#ffaa00;">HANTAV4 GPU Storm</button>
  <button id="spawnV5" style="background:#00ffaa;">HANTAV5 Spike Planet</button>
  <button id="spawnV6" style="background:#00aaff;">HANTAV6 Particle Blast</button>
  <button id="spawnV7" style="background:#2222ff;">HANTAV7 Black Hole</button>
  <button id="spawnV8" style="background:#ff00aa;">HANTAV8 Screen Shake</button>
</div>

<script>
let appStarted = false;
function block() { return !appStarted; }

document.getElementById("tapToStart").addEventListener("mousedown", startApp, { once: true });
document.getElementById("tapToStart").addEventListener("touchstart", startApp, { once: true });
document.body.addEventListener("click", startApp, { once: true });

function startApp() {
  if (appStarted) return;
  appStarted = true;

  document.getElementById("tapToStart").style.display = "none";

  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
  script.onload = () => {
    init();
    animate();
  };
  document.body.appendChild(script);
}

let scene, camera, renderer;
let spikyGroup;
let lastTime = performance.now();
let fpsEl;

let dragging = false;
let prevX = 0, prevY = 0;
let yaw = 0, pitch = 0;

let zoomIn = false;
let zoomOut = false;
let zoomVelocity = 0;
let zoomAccel = 2.0;
let zoomMax = 80;

let v2Level = 1;
let v3Level = 1;

let stopAll = false;

let gpuStormActive = false;
let shakeActive = false;
let baseCamPos = null;

let blackHoleActive = false;

let spikePlanet = null;
let particleSystem = null;

function init() {
  if (block()) return;

  document.getElementById("ui").style.display = "block";
  document.getElementById("uiToggle").style.display = "flex";

  fpsEl = document.getElementById("fps");

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 4000);
  camera.position.set(0, 0, 140);
  baseCamPos = camera.position.clone();

  renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
  renderer.domElement.style.pointerEvents = "auto";

  scene.add(new THREE.AmbientLight(0x555555));

  const d1 = new THREE.DirectionalLight(0xff66ff, 1.2);
  d1.position.set(50, 80, 40);
  scene.add(d1);

  const d2 = new THREE.DirectionalLight(0x66ccff, 0.9);
  d2.position.set(-60, -40, -30);
  scene.add(d2);

  spikyGroup = new THREE.Group();
  scene.add(spikyGroup);

  initControls();
  initZoomControls();
  initGlobalKeys();

  document.getElementById("spawnV1").onclick = () => { stopAll = false; spawnV1(); };
  document.getElementById("spawnV2").onclick = () => { stopAll = false; v2Level = 1; spawnV2(); };
  document.getElementById("spawnV3").onclick = () => { stopAll = false; v3Level = 1; spawnV3(); };
  document.getElementById("spawnV4").onclick = () => { gpuStormActive = true; shakeActive = true; spawnV4(); };
  document.getElementById("spawnV5").onclick = () => { spawnV5(); };
  document.getElementById("spawnV6").onclick = () => { spawnV6(); };
  document.getElementById("spawnV7").onclick = () => { blackHoleActive = true; };
  document.getElementById("spawnV8").onclick = () => { shakeActive = true; };

  window.addEventListener("resize", onResize);
}

function makeSpikyGeo() {
  const geo = new THREE.IcosahedronGeometry(4, 3);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const len = Math.sqrt(x*x + y*y + z*z) || 1;
    const spike = 1 + Math.random() * 4.5;
    pos.setXYZ(i, (x/len)*len*spike, (y/len)*len*spike, (z/len)*len*spike);
  }

  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

function makeFlashMat(intensityBoost = 0) {
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(Math.random(), Math.random(), Math.random()),
    metalness: 1.0,
    roughness: 0.1,
    emissive: new THREE.Color(Math.random(), Math.random(), Math.random()),
    emissiveIntensity: 3 + Math.random() * 4 + intensityBoost
  });
}

function spawnV1() {
  if (block() || stopAll) return;

  const geo = makeSpikyGeo();
  const mat = makeFlashMat();
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.set(
    (Math.random() - 0.5) * 600,
    (Math.random() - 0.5) * 600,
    (Math.random() - 0.5) * 600
  );

  mesh.rotation.set(
    Math.random() * Math.PI,
    Math.random() * Math.PI,
    Math.random() * Math.PI
  );

  const s = 1 + Math.random() * 6;
  mesh.scale.set(s, s, s);

  spikyGroup.add(mesh);

  requestAnimationFrame(spawnV1);
}

function spawnV2() {
  if (block() || stopAll) return;

  v2Level += 0.5;
  const count = Math.floor(200 * v2Level);

  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(makeSpikyGeo(), makeFlashMat());
    mesh.position.set(
      (Math.random() - 0.5) * (400 + v2Level * 40),
      (Math.random() - 0.5) * (400 + v2Level * 40),
      (Math.random() - 0.5) * (400 + v2Level * 40)
    );
    spikyGroup.add(mesh);
  }

  setTimeout(() => { if (!stopAll) spawnV2(); }, 200);
}

function spawnV3() {
  if (block() || stopAll) return;

  v3Level += 0.3;
  const count = Math.floor(40 * v3Level);

  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(makeSpikyGeo(), makeFlashMat());
    mesh.position.set(
      (Math.random() - 0.5) * (500 + v3Level * 50),
      (Math.random() - 0.5) * (500 + v3Level * 50),
      (Math.random() - 0.5) * (500 + v3Level * 50)
    );
    spikyGroup.add(mesh);
  }

  requestAnimationFrame(() => { if (!stopAll) spawnV3(); });
}

function spawnV4() {
  if (block() || stopAll) return;

  const count = 300;
  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(makeSpikyGeo(), makeFlashMat(6));
    mesh.position.set(
      (Math.random() - 0.5) * 800,
      (Math.random() - 0.5) * 800,
      (Math.random() - 0.5) * 800
    );
    mesh.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    const s = 2 + Math.random() * 10;
    mesh.scale.set(s, s, s);
    spikyGroup.add(mesh);
  }
}

function spawnV5() {
  if (block()) return;

  if (spikePlanet) {
    scene.remove(spikePlanet);
    spikePlanet = null;
  }

  spikePlanet = new THREE.Group();
  const baseRadius = 40;

  for (let i = 0; i < 2000; i++) {
    const mesh = new THREE.Mesh(makeSpikyGeo(), makeFlashMat(4));
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = baseRadius + Math.random() * 10;

    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta);
    const z = r * Math.cos(phi);

    mesh.position.set(x, y, z);
    spikePlanet.add(mesh);
  }

  spikePlanet.position.set(0, 0, 0);
  scene.add(spikePlanet);
}

function spawnV6() {
  if (block()) return;

  if (particleSystem) {
    scene.remove(particleSystem);
    particleSystem = null;
  }

  const count = 50000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    positions[i3] = (Math.random() - 0.5) * 800;
    positions[i3 + 1] = (Math.random() - 0.5) * 800;
    positions[i3 + 2] = (Math.random() - 0.5) * 800;

    colors[i3] = Math.random();
    colors[i3 + 1] = Math.random();
    colors[i3 + 2] = Math.random();
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 2,
    vertexColors: true,
    transparent: true,
    opacity: 0.9
  });

  particleSystem = new THREE.Points(geo, mat);
  scene.add(particleSystem);
}

function applyBlackHole() {
  if (!blackHoleActive) return;
  const center = new THREE.Vector3(0, 0, 0);
  const pull = 0.02;

  spikyGroup.children.forEach(m => {
    const dir = center.clone().sub(m.position);
    m.position.addScaledVector(dir, pull);
  });

  if (spikePlanet) {
    spikePlanet.children.forEach(m => {
      const dir = center.clone().sub(m.position);
      m.position.addScaledVector(dir, pull * 0.5);
    });
  }

  if (particleSystem) {
    const pos = particleSystem.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const y = pos.getY(i);
      const z = pos.getZ(i);
      const dir = center.clone().sub(new THREE.Vector3(x, y, z));
      const nx = x + dir.x * pull;
      const ny = y + dir.y * pull;
      const nz = z + dir.z * pull;
      pos.setXYZ(i, nx, ny, nz);
    }
    pos.needsUpdate = true;
  }
}

function applyShake() {
  if (!shakeActive) {
    camera.position.copy(baseCamPos);
    return;
  }
  const intensity = 3;
  camera.position.set(
    baseCamPos.x + (Math.random() - 0.5) * intensity,
    baseCamPos.y + (Math.random() - 0.5) * intensity,
    baseCamPos.z + (Math.random() - 0.5) * intensity
  );
}

function initControls() {
  renderer.domElement.addEventListener("pointerdown", e => {
    dragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
  });

  renderer.domElement.addEventListener("pointermove", e => {
    if (!dragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    prevX = e.clientX;
    prevY = e.clientY;
    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
  });

  renderer.domElement.addEventListener("pointerup", () => dragging = false);

  renderer.domElement.addEventListener("touchstart", e => {
    dragging = true;
    prevX = e.touches[0].clientX;
    prevY = e.touches[0].clientY;
  });

  renderer.domElement.addEventListener("touchmove", e => {
    if (!dragging) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - prevX;
    const dy = y - prevY;
    prevX = x;
    prevY = y;
    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
  });

  renderer.domElement.addEventListener("touchend", () => dragging = false);
}

function initZoomControls() {
  window.addEventListener("keydown", e => {
    if (e.code === "KeyE") zoomIn = true;
    if (e.code === "KeyQ") zoomOut = true;
  });
  window.addEventListener("keyup", e => {
    if (e.code === "KeyE") zoomIn = false;
    if (e.code === "KeyQ") zoomOut = false;
  });
}

function initGlobalKeys() {
  window.addEventListener("keydown", e => {
    if (e.code === "KeyU") {
      stopAll = true;
    }
    if (e.code === "Space") {
      stopAll = false;
      gpuStormActive = false;
      shakeActive = false;
      blackHoleActive = false;
      clearAllSpikes();
    }
  });
}

function clearAllSpikes() {
  if (block()) return;

  while (spikyGroup.children.length > 0) {
    spikyGroup.remove(spikyGroup.children[0]);
  }

  if (spikePlanet) {
    scene.remove(spikePlanet);
    spikePlanet = null;
  }

  if (particleSystem) {
    scene.remove(particleSystem);
    particleSystem = null;
  }
}

function updateCamera() {
  const forward = new THREE.Vector3(
    Math.sin(yaw),
    Math.sin(pitch),
    Math.cos(yaw)
  );

  if (zoomIn) {
    zoomVelocity = Math.min(zoomVelocity + zoomAccel, zoomMax);
  } else if (zoomOut) {
    zoomVelocity = Math.max(zoomVelocity - zoomAccel, -zoomMax);
  } else {
    zoomVelocity *= 0.85;
  }

  camera.position.addScaledVector(forward, zoomVelocity);
  baseCamPos.copy(camera.position);

  const lookTarget = forward.clone().add(camera.position);
  camera.lookAt(lookTarget);
}

function animate() {
  if (block()) return;

  requestAnimationFrame(animate);

  const now = performance.now();
  const fps = Math.round(1000 / (now - lastTime));
  lastTime = now;
  fpsEl.textContent = "FPS: " + fps;

  spikyGroup.rotation.y += 0.002;
  spikyGroup.rotation.x += 0.001;

  if (spikePlanet) {
    spikePlanet.rotation.y += 0.003;
    spikePlanet.rotation.x += 0.001;
  }

  if (gpuStormActive) {
    spikyGroup.children.forEach(m => {
      if (m.material && m.material.emissiveIntensity !== undefined) {
        m.material.emissiveIntensity = 6 + Math.sin(now * 0.01) * 4;
      }
    });
  }

  applyBlackHole();
  updateCamera();
  applyShake();

  renderer.render(scene, camera);
}

function onResize() {
  if (!camera || !renderer) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
</script>

</body>
</html>
